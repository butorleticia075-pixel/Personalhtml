<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Leticia</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter',sans-serif;
  background: #fff7fb;
  color:#1f2933;
}

/* HEADER */
header{
  position:sticky;
  top:0;
  background:#ff4f8b;
  backdrop-filter: blur(8px);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 20px;
  border-bottom:1px solid #ffe0ee;
}
.logo{
  font-weight:800;
  color:#ff6fa1;
  letter-spacing:2px;
}
.menu{
  display:flex;
  gap:16px;
}
.menu a{
  text-decoration:none;
  color:#475569;
  font-weight:600;
  font-size:14px;
  padding:6px 10px;
  border-radius:999px;
  transition:.2s ease;
}
.menu a:hover{
  background:#ffe3ef;
  color:#ff4f8b;
}

/* HERO */
.hero{
  min-height:80vh;
  display:grid;
  place-items:center;
  text-align:center;
  padding:60px 20px;
}
.hero img{
  width:160px;
  border-radius:24px;
  box-shadow:0 10px 20px rgba(0,0,0,.15);
  margin-bottom:20px;
}
.hero h1{
  font-size:36px;
  font-weight:800;
  margin-bottom:10px;
}
.hero p{
  color:#6b7280;
  max-width:420px;
  margin:auto;
}
.btn{
  display:inline-block;
  margin-top:20px;
  background:#ff6fa1;
  color:#fff;
  padding:10px 18px;
  border-radius:999px;
  text-decoration:none;
  font-weight:700;
  box-shadow:0 10px 20px rgba(255,111,161,.35);
}
.btn:hover{opacity:.9}

/* CARDS */
.section{
  padding:40px 20px 80px;
  max-width:900px;
  margin:auto;
}
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:16px;
  align-items:stretch; /* importante ito */

}
.card{
  background:#fff;
  border-radius:18px;
  padding:18px;
  box-shadow:0 10px 20px rgba(0,0,0,.06);

  display:flex;
  flex-direction:column;
}
.card{
  background:#fff;
  border-radius:18px;
  padding:18px;
  box-shadow:0 10px 20px rgba(0,0,0,.06);

  display:flex;
  flex-direction:column;
  height:100%; /* para pantay pababa */
}
.card .btn{
  margin-top:auto;
}
.card h3{
  font-size:16px;
  margin-bottom:6px;
}
.card p{
  font-size:14px;
  color:#6b7280;
}
.card img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:12px;
  margin-bottom:10px;
}
</style>
</head>
<section class="section">
  <div class="cards">

    <div class="card">
      <img src="anime.jpg" alt="My Fav Anime">
      <h3>My Fav Anime</h3>
      <p>I love watching anime because it's fun and inspiring.</p>
    </div>

    <div class="card">
      <img src="cat.jpg" alt="My Ideal Cat">
      <h3>My Ideal Cat</h3>
      <p>I want a cute and fluffy cat in the future.</p>
    </div>

    <div class="card">
      <img src="miya.jpg" alt="Favorite Hero">
      <h3>My Favorite Hero in ML</h3>
      <p>Miya is my favorite hero because she is strong and fast.</p>
    </div>

      
    </div>
<a href="/welcome.html" class="btn">BACK</a>
  </div>
</section>
