<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Leticia</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:#ead7dd;
  color:#1f2933;
  text-align:center;
}

/* ===== HEADER ===== */
header{
  background:#ffffff;
  border-bottom:1px solid #ffd6e7;
  padding:10px 0;
}

/* Container */
.header-container{
  display:flex;
  flex-direction:column;   /* logo sa taas, menu sa baba */
  align-items:center;
  gap:8px;
}

/* LOGO */
.logo{
  font-size:28px;
  font-weight:800;
  color:#ff4f8b;
  text-shadow:2px 4px 10px rgba(0,0,0,0.2);
}

/* MENU */
.menu{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:20px;
  flex-wrap:wrap;
}

/* MENU LINKS */
.menu a{
  text-decoration:none;
  font-weight:600;
  color:#475569;
  font-size:14px;
  transition:.3s;
}

.menu a:hover{
  color:#ff4f8b;
}
/* ===== LOGO ===== */
.page-logo{
  margin-top:40px;
  font-size:42px;
  font-weight:800;
  color:#ff6fa1;
  letter-spacing:2px;
  animation: floatGlow 1s ease-in-out infinite;
  text-shadow:
    4px 4px 0px #e64980,
    8px 8px 20px rgba(0,0,0,.25);
}

@keyframes floatGlow{
  0%{ transform:translateY(0); }
  50%{ transform:translateY(-10px); }
  100%{ transform:translateY(0); }
}

/* ===== SECTION ===== */
.section{
  padding:40px 20px 80px;
}

.contact-title{
  font-size:30px;
  font-weight:800;
  margin-bottom:25px;
}

/* ===== CARDS ===== */
.cards{
  display:flex;
  flex-direction:column;
  gap:20px;
  max-width:500px;
  margin:0 auto;
}

.card{
  background:#fff;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.card h3{
  margin-bottom:10px;
}

.card a{
  color:#ff4f8b;
  text-decoration:none;
  font-weight:600;
}

.card a:hover{
  text-decoration:underline;
}

/* MAP */
iframe{
  border-radius:16px;
}

/* ===== RESPONSIVE ===== */
@media(max-width:500px){
  .page-logo{
    font-size:34px;
  }
}
</style>
</head>

<body>

<header>
  <nav class="menu">
    <a href="welcome.html">Home</a>
    <a href="about.html">About Me</a>
    <a href="meandmyfriend.html">Photo</a>
    <a href="contact.html" class="active">Contact</a>
    <a href="login.html">Log out</a>
  </nav>
</header>

<div class="page-logo">LETICIA</div>

<section class="section" id="map">
  <h2 class="contact-title">🗺️ My Location</h2>

  <div class="cards">
    <div class="card">
      <iframe
        src="https://www.google.com/maps?q=bulacan,%20batia,%20Philippines&output=embed"
        width="100%"
        height="280"
        loading="lazy">
      </iframe>
    </div>

    <div class="card">
      <h3>📧 Gmail</h3>
      <p>
        <a href="mailto:leticiabutor076@gmail.com">
          leticiabutor076@gmail.com
        </a>
      </p>
    </div>

    <div class="card">
      <h3>📘 Facebook</h3>
      <p>
        <a href="https://www.facebook.com" target="_blank">
          facebook.com/yourprofile
        </a>
      </p>
    </div>
  </div>
</section>

</body>
</html>
